<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cadastro - Portal do Aluno</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family: 'Segoe UI', sans-serif; }
    body { min-height:100vh; background:linear-gradient(135deg, #667eea, #764ba2); display:flex; align-items:center; justify-content:center; padding:20px; }
    .container { background:white; padding:40px 30px; border-radius:12px; box-shadow:0 10px 30px rgba(0,0,0,0.2); width:100%; max-width:420px; }
    h1 { text-align:center; margin-bottom:30px; color:#333; }
    .form-group { margin-bottom:20px; }
    label { display:block; margin-bottom:8px; color:#555; font-weight:500; }
    input { width:100%; padding:12px 15px; border:1px solid #ddd; border-radius:6px; font-size:16px; }
    input:focus { outline:none; border-color:#667eea; box-shadow:0 0 0 3px rgba(102,126,234,0.2); }
    button { width:100%; padding:14px; background:#667eea; color:white; border:none; border-radius:6px; font-size:16px; cursor:pointer; }
    button:hover { background:#5a67d8; }
    .link { text-align:center; margin-top:20px; }
    .link a { color:#667eea; text-decoration:none; }
    .link a:hover { text-decoration:underline; }
  </style>
</head>
<body>

  <div class="container">
    <h1>Cadastro de Aluno</h1>
    
    <form id="cadastroForm">
      <div class="form-group">
        <label for="nome">Nome completo</label>
        <input type="text" id="nome" required>
      </div>
      <div class="form-group">
        <label for="matricula">Matrícula</label>
        <input type="text" id="matricula" required>
      </div>
      <div class="form-group">
        <label for="senha">Senha</label>
        <input type="password" id="senha" required>
      </div>
      <button type="submit">Cadastrar</button>
    </form>

    <div class="link">
      Já tem conta? <a href="index.html">Faça login</a>
    </div>
  </div>

  <script>
    document.getElementById('cadastroForm').addEventListener('submit', function(e) {
      e.preventDefault();
      
      const nome = document.getElementById('nome').value.trim();
      const matricula = document.getElementById('matricula').value.trim();
      const senha = document.getElementById('senha').value.trim();
      
      if (!nome || !matricula || !senha) {
        alert('Preencha todos os campos!');
        return;
      }
      
      localStorage.setItem('alunoNome', nome);
      localStorage.setItem('alunoMatricula', matricula);
      localStorage.setItem('alunoSenha', senha); 
      alert('Cadastro realizado! Agora faça login.');
      window.location.href = 'index.html';
    });
  </script>

</body>
</html>
